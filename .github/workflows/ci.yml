name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite://
          SEED_FILE: ../mock-data/prospects.json

  deploy:
    needs: backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/disha/backend:${{ github.sha }} \
            --file backend/Dockerfile .
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy disha-backend \
            --image asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/disha/backend:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --project ${{ secrets.GCP_PROJECT }}
